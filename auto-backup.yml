name: Auto Backup Repositories

on:
  # Run on a schedule - weekly at Sunday midnight
  schedule:
    - cron: '0 0 * * 0'
  
  # Run manually when needed
  workflow_dispatch:
    inputs:
      specific_repo:
        description: 'Backup specific repo (leave empty for all)'
        required: false
        type: string

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    permissions:
      contents: read
      issues: write
      
    steps:
      - name: Checkout backup automation repo
        uses: actions/checkout@v4
        with:
          repository: pfn000/backup-automation
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install twilio google-auth-oauthlib google-auth-httplib2 google-api-python-client
          # Install rclone for Google Drive
          sudo apt-get update
          sudo apt-get install -y rclone
          
      - name: Configure Git
        run: |
          git config --global user.email "backup-bot@ncomsystems.com"
          git config --global user.name "GitHub Backup Bot"
          
      - name: Configure rclone for Google Drive
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONFIG" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          
      - name: Run backup for all repositories
        if: github.event.inputs.specific_repo == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_FROM: ${{ secrets.TWILIO_PHONE_FROM }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python backup_manager.py
          
      - name: Run backup for specific repository
        if: github.event.inputs.specific_repo != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_FROM: ${{ secrets.TWILIO_PHONE_FROM }}
        run: |
          python backup_manager.py ${{ github.event.inputs.specific_repo }}
          
      - name: Upload backup logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backup-logs
          path: |
            backup.log
            backups/*/backup_report.json
          retention-days: 30
          
      - name: Create GitHub Issue on backup failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Repository Backup Failed - ${new Date().toLocaleDateString()}`,
              body: `
              ## Automated Backup Failure
              
              **Time:** ${new Date().toISOString()}
              **Workflow:** ${context.workflow}
              **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              
              Check the workflow logs for details.
              
              **Action Required:**
              - Review the backup logs
              - Check GitHub credentials
              - Verify Google Drive access
              - Check Twilio configuration
              `,
              labels: ['backup', 'automated', 'failure']
            })
            
      - name: Send backup summary notification
        if: always()
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_FROM: ${{ secrets.TWILIO_PHONE_FROM }}
        run: |
          python -c "
          import os
          import subprocess
          from datetime import datetime
          
          # Check backup result
          result = 'SUCCESS' if '${{ job.status }}' == 'success' else 'FAILED'
          
          message = f'📦 Weekly GitHub backup {result} at {datetime.now().strftime(\"%H:%M\")} - All repos backed to Drive ✅'
          
          if all([os.getenv('TWILIO_ACCOUNT_SID'), os.getenv('TWILIO_AUTH_TOKEN')]):
              try:
                  from twilio.rest import Client
                  client = Client(os.getenv('TWILIO_ACCOUNT_SID'), os.getenv('TWILIO_AUTH_TOKEN'))
                  client.messages.create(
                      body=message,
                      from_=os.getenv('TWILIO_PHONE_FROM'),
                      to='+17248313809'
                  )
                  print('✅ SMS sent')
              except Exception as e:
                  print(f'SMS error: {e}')
          "

  webhook-listener:
    runs-on: ubuntu-latest
    if: github.event_name == 'repository' && github.event.action == 'created'
    
    steps:
      - name: New repository created
        run: |
          echo "🎉 New repository created: ${{ github.event.repository.name }}"
          echo "Triggering automatic backup..."
          
      - name: Trigger backup for new repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = '${{ github.event.repository.name }}';
            console.log(`Backing up new repository: ${repo}`);
            
